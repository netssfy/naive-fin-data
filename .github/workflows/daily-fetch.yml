name: daily-fetch

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional symbol count limit per market and period (empty means full)"
        required: false
        type: string
  schedule:
    # 22:00 UTC = 06:00 Asia/Shanghai
    - cron: "0 22 * * *"

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full fetch A-share for all periods
        env:
          PYTHONPATH: src
          INPUT_LIMIT: ${{ github.event.inputs.limit }}
        run: |
          set -e
          PERIODS=("1m" "5m" "15m" "30m" "60m" "1d")
          LIMIT_ARG=""
          if [ -n "$INPUT_LIMIT" ]; then
            LIMIT_ARG="--limit $INPUT_LIMIT"
          fi

          for PERIOD in "${PERIODS[@]}"; do
            echo "Fetching A-share period=${PERIOD} limit=${INPUT_LIMIT:-full}"
            python -m naive_fin_data.cli full-a --type stock --period "$PERIOD" --output-root data $LIMIT_ARG
          done

      - name: Run full fetch HK for all periods
        env:
          PYTHONPATH: src
          INPUT_LIMIT: ${{ github.event.inputs.limit }}
        run: |
          set -e
          PERIODS=("1m" "5m" "15m" "30m" "60m" "1d")
          LIMIT_ARG=""
          if [ -n "$INPUT_LIMIT" ]; then
            LIMIT_ARG="--limit $INPUT_LIMIT"
          fi

          for PERIOD in "${PERIODS[@]}"; do
            echo "Fetching HK period=${PERIOD} limit=${INPUT_LIMIT:-full}"
            python -m naive_fin_data.cli full-hk --type stock --period "$PERIOD" --output-root data $LIMIT_ARG
          done

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -d data ]; then
            git add data
          fi

          if ! git diff --staged --quiet; then
            git commit -m "chore(data): daily fetch"
            git push origin HEAD:${{ github.ref_name }}
          fi
