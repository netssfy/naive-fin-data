name: daily-fetch

on:
  workflow_dispatch:
  schedule:
    # 09:00 UTC = 17:00 Asia/Shanghai
    - cron: "0 9 * * *"

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch A-share selected symbols for all periods
        env:
          PYTHONPATH: src
        run: |
          set -e
          PERIODS=("1m" "5m" "15m" "30m" "60m" "1d")
          CODES=("000725")

          for PERIOD in "${PERIODS[@]}"; do
            for CODE in "${CODES[@]}"; do
              echo "Fetching A-share code=${CODE} period=${PERIOD}"
              python -m naive_fin_data.cli single-a --type stock --code "$CODE" --period "$PERIOD" --output-root data
            done
          done

      - name: Fetch HK selected symbols for all periods
        env:
          PYTHONPATH: src
        run: |
          set -e
          PERIODS=("1m" "5m" "15m" "30m" "60m" "1d")
          CODES=("1810" "0700")

          for PERIOD in "${PERIODS[@]}"; do
            for CODE in "${CODES[@]}"; do
              echo "Fetching HK code=${CODE} period=${PERIOD}"
              python -m naive_fin_data.cli single-hk --type stock --code "$CODE" --period "$PERIOD" --output-root data
            done
          done

      - name: Build page status data
        run: |
          python scripts/build_status_page_data.py

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -d data ]; then
            git add data
          fi
          if [ -d docs ]; then
            git add docs
          fi

          if ! git diff --staged --quiet; then
            git commit -m "chore(data): daily fetch"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
