<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naive Fin Data Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=20260318-3">
</head>
<body>
  <div class="bg-layer bg-layer-a"></div>
  <div class="bg-layer bg-layer-b"></div>

  <main class="container">
    <section class="hero">
      <p class="eyebrow">NAIVE FIN DATA</p>
      <h1>Status Dashboard</h1>
      <p class="subtitle">Based on latest status.json with symbol-level and period-level status (UTC+8).</p>
      <div class="metrics" id="metrics"></div>
    </section>

    <section class="controls">
      <div class="control-block">
        <div class="control-label">Market</div>
        <div class="chips" id="marketFilters"></div>
      </div>
      <input id="searchInput" class="search" type="search" placeholder="Search code or name, e.g. 000725 / Tencent" />
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Market</th>
            <th>Code / Name</th>
            <th>Status</th>
            <th>Total Records</th>
            <th>Latest Fetch</th>
            <th>Latest Data</th>
            <th>Period Details</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <p id="emptyState" class="empty hidden">No matched data.</p>
    </section>
  </main>

  <script src="./app.js?v=20260318-3"></script>
</body>
</html>
