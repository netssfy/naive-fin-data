<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naive Fin Data Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-layer bg-layer-a"></div>
  <div class="bg-layer bg-layer-b"></div>

  <main class="container">
    <section class="hero">
      <p class="eyebrow">NAIVE FIN DATA</p>
      <h1>抓取状态看板</h1>
      <p class="subtitle">基于最新 status.json 展示标的级与 period 级抓取状态（UTC+8）。</p>
      <div class="metrics" id="metrics"></div>
    </section>

    <section class="controls">
      <div class="control-block">
        <div class="control-label">市场</div>
        <div class="chips" id="marketFilters"></div>
      </div>
      <div class="control-block">
        <div class="control-label">周期</div>
        <div class="chips" id="periodFilters"></div>
      </div>
      <input id="searchInput" class="search" type="search" placeholder="搜索代码或名称，例如 000725 / 腾讯" />
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>市场</th>
            <th>代码 / 名称</th>
            <th>状态</th>
            <th>累计记录</th>
            <th>最新抓取</th>
            <th>最新数据时间</th>
            <th>周期明细</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <p id="emptyState" class="empty hidden">没有匹配的数据。</p>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
